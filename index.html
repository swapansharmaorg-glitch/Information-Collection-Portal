<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Information Collection Portal</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f1f5f9;
}

.header{
    background:#0f172a;
    color:white;
    padding:20px;
    text-align:center;
}

.header h1{
    font-size:32px;
}

.header p{
    opacity:0.8;
}

.container{
    max-width:1000px;
    margin:30px auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:30px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group.full{
    grid-column:1/-1;
}

label{
    margin-bottom:6px;
    font-weight:600;
    color:#334155;
}

input,select{
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:15px;
}

input:focus,
select:focus{
    outline:none;
    border-color:#2563eb;
}

.buttons{
    margin-top:25px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

button{
    border:none;
    padding:14px 20px;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
    color:white;
    font-weight:600;
}

.submit-btn{
    background:#2563eb;
}

.view-btn{
    background:#16a34a;
}

.download-btn{
    background:#ea580c;
}

button:hover{
    opacity:.9;
}

.result{
    display:none;
    margin-top:30px;
    background:#f8fafc;
    border:1px solid #e2e8f0;
    border-radius:10px;
    padding:20px;
}

.result h2{
    color:#0f172a;
    margin-bottom:15px;
}

.result p{
    margin:8px 0;
}

.footer{
    text-align:center;
    padding:20px;
    color:#64748b;
}

@media(max-width:768px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .buttons{
        flex-direction:column;
    }

    button{
        width:100%;
    }
}

</style>
</head>
<body>

<div class="header">
    <h1>Information Collection Portal</h1>
    <p>Citizen Registration & Record Management System</p>
</div>

<div class="container">

<div class="card">

<form id="infoForm">

<div class="form-grid">

<div class="form-group full">
<label>Name (As per Aadhaar)</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" id="dob" required>
</div>

<div class="form-group">
<label>Gender</label>
<select id="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="form-group">
<label>Mobile Number</label>
<input type="tel" id="mobile" required>
</div>

<div class="form-group">
<label>Aadhaar Number</label>
<input type="text" id="aadhaar" required>
</div>

<div class="form-group">
<label>ABHA ID</label>
<input type="text" id="abha">
</div>

<div class="form-group">
<label>Ration Card Number</label>
<input type="text" id="ration">
</div>

<div class="form-group">
<label>Voter ID Number</label>
<input type="text" id="voter">
</div>

<div class="form-group">
<label>Village / Town</label>
<input type="text" id="village" required>
</div>

<div class="form-group">
<label>District</label>
<input type="text" id="district" required>
</div>

<div class="form-group full">
<label>State</label>
<input type="text" id="state" required>
</div>

</div>

<div class="buttons">
<button type="submit" class="submit-btn">
Submit Form
</button>

<button type="button" class="view-btn"
onclick="viewLastSubmission()">
View Last Submission
</button>

<button type="button" class="download-btn"
onclick="downloadLastPDF()">
Download Last PDF
</button>
</div>

</form>

<div class="result" id="resultBox">
<h2>Last Submitted Record</h2>
<div id="recordData"></div>
</div>

</div>

</div>

<div class="footer">
© 2026 Information Collection Portal
</div>

<script>

const { jsPDF } = window.jspdf;

document.getElementById("infoForm").addEventListener("submit", function(e){

    e.preventDefault();

    const formData = {
        name: document.getElementById("name").value,
        dob: document.getElementById("dob").value,
        gender: document.getElementById("gender").value,
        mobile: document.getElementById("mobile").value,
        aadhaar: document.getElementById("aadhaar").value,
        abha: document.getElementById("abha").value,
        ration: document.getElementById("ration").value,
        voter: document.getElementById("voter").value,
        village: document.getElementById("village").value,
        district: document.getElementById("district").value,
        state: document.getElementById("state").value,
        submittedAt: new Date().toLocaleString()
    };

    localStorage.setItem(
        "lastSubmission",
        JSON.stringify(formData)
    );

    generatePDF(formData);

    alert("Form submitted successfully.");

    document.getElementById("infoForm").reset();
});

function generatePDF(data){

    const doc = new jsPDF();

    doc.setFontSize(20);
    doc.text("Information Collection Form", 20, 20);

    doc.setFontSize(12);

    let y = 40;

    for(const key in data){

        doc.text(
            `${key}: ${data[key] || "-"}`,
            20,
            y
        );

        y += 10;
    }

    doc.save(
        `${data.name.replace(/\s+/g,'_')}.pdf`
    );
}

function viewLastSubmission(){

    const saved =
    localStorage.getItem("lastSubmission");

    if(!saved){
        alert("No submission found.");
        return;
    }

    const data = JSON.parse(saved);

    document.getElementById("recordData").innerHTML = `
    <p><strong>Name:</strong> ${data.name}</p>
    <p><strong>Date of Birth:</strong> ${data.dob}</p>
    <p><strong>Gender:</strong> ${data.gender}</p>
    <p><strong>Mobile:</strong> ${data.mobile}</p>
    <p><strong>Aadhaar:</strong> ${data.aadhaar}</p>
    <p><strong>ABHA ID:</strong> ${data.abha}</p>
    <p><strong>Ration Card:</strong> ${data.ration}</p>
    <p><strong>Voter ID:</strong> ${data.voter}</p>
    <p><strong>Village:</strong> ${data.village}</p>
    <p><strong>District:</strong> ${data.district}</p>
    <p><strong>State:</strong> ${data.state}</p>
    <p><strong>Submitted At:</strong> ${data.submittedAt}</p>
    `;

    document.getElementById("resultBox")
    .style.display = "block";
}

function downloadLastPDF(){

    const saved =
    localStorage.getItem("lastSubmission");

    if(!saved){
        alert("No saved record found.");
        return;
    }

    generatePDF(JSON.parse(saved));
}

</script>

</body>
</html>
